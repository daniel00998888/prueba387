<!DOCTYPE html>
<html>
<head>
    <title>SISTEMA DE MONITOREO VIVO</title>
    <style>
        body { background: #0a0a0a; color: #39ff14; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        #header { background: #1a1a1a; padding: 10px; border-bottom: 2px solid #39ff14; font-weight: bold; }
        img { width: 90%; max-width: 800px; margin-top: 20px; border: 3px solid #39ff14; box-shadow: 0 0 20px #39ff14; background: #000; }
    </style>
</head>
<body>
    <div id="header">ESTADO: <span id="status">CONECTANDO...</span></div>
    <img id="display" src="">

    <script>
        const status = document.getElementById('status');
        const display = document.getElementById('display');
        const ws = new WebSocket('ws://localhost:80?admin');

        ws.onopen = () => { status.innerText = "ESPERANDO TRANSMISIÓN"; };
        ws.onmessage = (event) => {
            status.innerText = "RECIBIENDO VIDEO EN VIVO";
            // Usamos requestAnimationFrame para suavizar el movimiento
            requestAnimationFrame(() => {
                display.src = event.data;
            });
        };
        ws.onclose = () => { status.innerText = "SERVIDOR DESCONECTADO"; };
    </script>
</body>
</html>
